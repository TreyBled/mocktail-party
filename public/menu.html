<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu – Mocktail Party</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>🍸 Mocktail Menu</h1>
  <p style="color: #8B8680; margin-bottom: 2rem; font-size: 1.05rem;">Discover our selection of refreshing mocktails</p>

  <!-- Name input -->
  <div style="background: var(--color-surface-bright); padding: 1rem; border-radius: 12px; margin-bottom: 2rem; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;">
    <label style="color: var(--color-text-dim); font-weight: 500;">Your Name:</label>
    <input type="text" id="customer-name" placeholder="Enter your name" style="flex: 1; min-width: 150px; padding: 0.5rem 1rem; background: var(--color-surface); border: 1px solid rgba(0, 217, 255, 0.2); border-radius: 12px; color: var(--color-text);">
  </div>

  <div id="menu-list"></div>
  <div id="empty-state" style="text-align: center; padding: 3rem 1rem; display: none;">
    <p style="font-size: 1.1rem; color: #8B8680;">No drinks available right now</p>
    <small style="color: #5a4e42;">Check back soon while we stock up on ingredients!</small>
  </div>
</div>

<div id="toast" class="toast">✓ Order Placed</div>

<script>
  let lastMenuData = '';

  async function fetchJSON(url, options = {}) {
    try {
      const res = await fetch(url, options);
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    } catch (error) {
      console.error('Error:', error);
      showToast('Connection error. Please try again.', true);
      return null;
    }
  }

  function showToast(message = '✓ Order Placed', isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    if (isError) {
      toast.style.background = 'linear-gradient(135deg, #FF6B6B, #FF4757)';
      toast.style.color = 'white';
    } else {
      toast.style.background = 'linear-gradient(135deg, var(--color-neon-cyan), var(--color-neon-purple))';
      toast.style.color = '#0A0E27';
    }
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  async function loadMenu() {
    const drinks = await fetchJSON('/api/available-drinks');
    const container = document.getElementById('menu-list');
    const emptyState = document.getElementById('empty-state');

    if (!drinks || drinks.length === 0) {
      container.innerHTML = '';
      emptyState.style.display = 'block';
      lastMenuData = '';
      return;
    }
    emptyState.style.display = 'none';

    // Build HTML
    const html = drinks.map((d, index) => {
      const ingredientsHtml = d.ingredients && d.ingredients.length > 0
        ? d.ingredients.map(i => {
            const qty = i.quantity ? parseFloat(i.quantity) : '';
            const qtyDisplay = qty ? `${qty} ${i.unit || ''}` : i.name;
            return qtyDisplay;
          }).join(' • ')
        : '';

      return `
        <div class="drink-card" style="animation-delay: ${index * 0.1}s">
          <div class="drink-info">
            <h3>${d.name}</h3>
            ${d.description ? `<p>${d.description}</p>` : ''}
            ${ingredientsHtml ? `<small>📌 ${ingredientsHtml}</small>` : ''}
          </div>
          <button class="primary" onclick="orderDrink(${d.id})" style="white-space: nowrap;">Order Now</button>
        </div>
      `;
    }).join('');

    // Only update if changed
    if (html !== lastMenuData) {
      container.innerHTML = html;
      lastMenuData = html;
    }
  }

  async function orderDrink(drinkId) {
    const customerName = document.getElementById('customer-name').value.trim() || 'Anonymous';

    const result = await fetchJSON('/api/orders', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ drink_id: drinkId, customer_name: customerName })
    });

    if (result) {
      showToast(`✓ Order placed for ${customerName}`);
    }
  }

  // Poll less aggressively – 3 seconds
  setInterval(loadMenu, 3000);
  loadMenu();
</script>
</body>
</html>
