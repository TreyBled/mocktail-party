<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bartender – Mocktail Party</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Modal styles */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      animation: fadeIn 0.3s ease;
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal {
      background: var(--color-dark-lighter);
      border: 1px solid rgba(0, 217, 255, 0.3);
      border-radius: 24px;
      padding: 2.5rem;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      animation: slideUp 0.3s ease;
    }
    .modal h2 {
      margin-top: 0;
      color: var(--color-neon-cyan);
    }
    .modal label {
      display: block;
      margin: 1rem 0 0.3rem;
      color: var(--color-text-dim);
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.5px;
    }
    .modal input {
      width: 100%;
      padding: 0.8rem 1rem;
      font-size: 1rem;
      background: var(--color-surface);
      border: 1px solid rgba(0, 217, 255, 0.2);
      border-radius: 12px;
      color: var(--color-text);
      margin-bottom: 0.5rem;
      box-sizing: border-box;
    }
    .modal input:focus {
      border-color: var(--color-neon-cyan);
      box-shadow: 0 0 15px rgba(0, 217, 255, 0.2);
      outline: none;
    }
    .modal-actions {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
      justify-content: flex-end;
    }
    .modal-actions button {
      padding: 0.7rem 1.8rem;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .ingredient-item .ingredient-actions {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    .ingredient-item .ingredient-actions button {
      padding: 0.4rem 0.8rem;
      font-size: 0.8rem;
      white-space: nowrap;
    }
    .ingredient-item .ingredient-display {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex: 1;
      width: 100%;
    }
    .ingredient-item .ingredient-display label {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      cursor: pointer;
      flex: 1;
      margin: 0;
    }

    .ing-check-wrapper {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      width: 100%;
      margin: 0.4rem 0;
    }
    .ing-check-wrapper label {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      cursor: pointer;
      margin: 0;
    }
    .ing-check-wrapper input[type="number"] {
      width: 70px;
      padding: 0.3rem 0.5rem;
      margin: 0;
      background: var(--color-surface);
      border: 1px solid rgba(0, 217, 255, 0.2);
      border-radius: 8px;
      color: var(--color-text);
      font-size: 0.9rem;
      text-align: center;
    }
    .ing-check-wrapper input[type="number"]:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .ing-check-wrapper input[type="number"]:focus {
      border-color: var(--color-neon-cyan);
      outline: none;
    }
    .unit-hint {
      color: var(--color-text-dim);
      font-size: 0.8rem;
      min-width: 30px;
    }

    /* Search bar style */
    .search-input {
      width: 100%;
      padding: 0.5rem 1rem;
      margin-bottom: 1rem;
      background: var(--color-surface);
      border: 1px solid rgba(0, 217, 255, 0.2);
      border-radius: 12px;
      color: var(--color-text);
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }
    .search-input:focus {
      outline: none;
      border-color: var(--color-neon-cyan);
      box-shadow: 0 0 12px rgba(0, 217, 255, 0.2);
      background: rgba(0, 217, 255, 0.05);
    }
    .search-input::placeholder {
      color: var(--color-text-dim);
      opacity: 0.7;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🍹 Bartender Command Center</h1>

  <div class="flex-row">
    <!-- Left column -->
    <div class="flex-col">
      <!-- Wet Ingredients -->
      <div class="card">
        <h2>💧 Wet Ingredients</h2>
        <input type="text" id="wet-search" class="search-input" placeholder="🔍 Search wet ingredients...">
        <div id="wet-list" style="min-height: 100px;"></div>
        <hr>
        <form id="add-wet-form">
          <div style="display: flex; gap: 0.8rem;">
            <input type="text" id="wet-name" placeholder="Name (e.g., lime juice)" required style="flex: 2; margin: 0;">
            <input type="text" id="wet-unit" placeholder="Unit (ml)" style="flex: 1; margin: 0;">
            <button type="submit" class="primary" style="white-space: nowrap; margin: 0;">Add</button>
          </div>
        </form>
      </div>

      <!-- Dry Ingredients -->
      <div class="card">
        <h2>🍂 Dry Ingredients</h2>
        <input type="text" id="dry-search" class="search-input" placeholder="🔍 Search dry ingredients...">
        <div id="dry-list" style="min-height: 100px;"></div>
        <hr>
        <form id="add-dry-form">
          <div style="display: flex; gap: 0.8rem;">
            <input type="text" id="dry-name" placeholder="Name (e.g., sugar)" required style="flex: 2; margin: 0;">
            <input type="text" id="dry-unit" placeholder="Unit (g)" style="flex: 1; margin: 0;">
            <button type="submit" class="primary" style="white-space: nowrap; margin: 0;">Add</button>
          </div>
        </form>
      </div>

      <!-- Add Drink -->
      <div class="card">
        <h2>✨ Create Drink Recipe</h2>
        <form id="add-drink-form">
          <input type="text" id="drink-name" placeholder="Drink name" required>
          <textarea id="drink-desc" placeholder="Brief description" rows="2"></textarea>
          <textarea id="drink-instr" placeholder="Instructions (how to prepare)" rows="3"></textarea>
          <div id="ingredient-selector" style="background: rgba(0, 217, 255, 0.05); padding: 1rem; border-radius: 12px; border: 1px solid rgba(0, 217, 255, 0.1);">
            <p style="margin-bottom: 0.5rem;"><strong>Select Ingredients & enter amount in the ingredient's unit</strong></p>
            <input type="text" id="ingredient-search" class="search-input" placeholder="🔍 Search ingredients..." style="margin-bottom: 0.8rem;">
            <div id="ingredient-checkboxes" style="max-height: 300px; overflow-y: auto;"></div>
          </div>
          <button type="submit" class="primary" style="margin-top: 0.5rem;">Create Recipe</button>
        </form>
      </div>
    </div>

    <!-- Right column: Orders -->
    <div class="flex-col">
      <div class="card">
        <h2>📋 Pending Orders</h2>
        <div id="orders-list" class="orders-sidebar">
          <p style="text-align: center; color: #8B8680;">No orders yet</p>
        </div>
      </div>

      <!-- Quick Stats -->
      <div class="card">
        <h2>📊 Quick Stats</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div style="padding: 1rem; background: rgba(0, 217, 255, 0.05); border-radius: 12px; border-left: 3px solid var(--color-neon-cyan);">
            <div style="color: var(--color-neon-cyan); font-weight: 600; font-size: 1.5rem;" id="wet-count">0</div>
            <div style="color: #8B8680; font-size: 0.9rem;">Wet Ingredients</div>
          </div>
          <div style="padding: 1rem; background: rgba(168, 85, 247, 0.05); border-radius: 12px; border-left: 3px solid var(--color-neon-purple);">
            <div style="color: var(--color-neon-purple); font-weight: 600; font-size: 1.5rem;" id="dry-count">0</div>
            <div style="color: #8B8680; font-size: 0.9rem;">Dry Ingredients</div>
          </div>
          <div style="padding: 1rem; background: rgba(212, 175, 55, 0.05); border-radius: 12px; border-left: 3px solid var(--color-gold);">
            <div style="color: var(--color-gold); font-weight: 600; font-size: 1.5rem;" id="drink-count">0</div>
            <div style="color: #8B8680; font-size: 0.9rem;">Available Drinks</div>
          </div>
          <div style="padding: 1rem; background: rgba(31, 79, 63, 0.05); border-radius: 12px; border-left: 3px solid var(--color-emerald);">
            <div style="color: var(--color-emerald); font-weight: 600; font-size: 1.5rem;" id="order-count">0</div>
            <div style="color: #8B8680; font-size: 0.9rem;">Pending Orders</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ========== EDIT MODAL ========== -->
<div class="modal-overlay" id="editModal" onclick="if(event.target===this) closeModal();">
  <div class="modal">
    <h2>✏️ Edit Ingredient</h2>
    <form id="edit-form" onsubmit="saveEdit(event)">
      <label for="edit-name">Name</label>
      <input type="text" id="edit-name" required>
      <label for="edit-unit">Unit (optional)</label>
      <input type="text" id="edit-unit" placeholder="e.g., ml, g, oz">
      <div class="modal-actions">
        <button type="button" onclick="closeModal()">Cancel</button>
        <button type="submit" class="primary">💾 Save Changes</button>
      </div>
    </form>
  </div>
</div>

<div id="toast" class="toast">Saved</div>

<script>
  // Store current edit state
  let currentEdit = { id: null, type: null };

  // ---------- Helper functions ----------
  async function fetchJSON(url, options = {}) {
    try {
      const res = await fetch(url, options);
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    } catch (error) {
      console.error('Fetch error:', error);
      return null;
    }
  }

  function showToast(message = 'Saved', isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    if (isError) {
      toast.style.background = 'linear-gradient(135deg, #FF6B6B, #FF4757)';
      toast.style.color = 'white';
    } else {
      toast.style.background = 'linear-gradient(135deg, var(--color-neon-cyan), var(--color-neon-purple))';
      toast.style.color = '#0A0E27';
    }
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // ---------- Modal functions ----------
  function openEditModal(id, type, name, unit) {
    currentEdit = { id, type };
    document.getElementById('edit-name').value = name;
    document.getElementById('edit-unit').value = unit || '';
    document.getElementById('editModal').classList.add('active');
  }

  function closeModal() {
    document.getElementById('editModal').classList.remove('active');
    currentEdit = { id: null, type: null };
  }

  async function saveEdit(e) {
    e.preventDefault();
    const name = document.getElementById('edit-name').value.trim();
    const unit = document.getElementById('edit-unit').value.trim();
    const { id, type } = currentEdit;

    if (!name) {
      showToast('Name is required', true);
      return;
    }

    const result = await fetchJSON(`/api/ingredients/${type}/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, unit })
    });

    if (result && result.success) {
      showToast('Ingredient updated');
      closeModal();
      loadIngredients();
    } else {
      showToast('Failed to update ingredient', true);
    }
  }

  // ---------- Filter functions ----------
  function filterList(containerId, searchId, itemSelector, textSelector) {
    const search = document.getElementById(searchId);
    if (!search) return;
    const term = search.value.toLowerCase().trim();
    const container = document.getElementById(containerId);
    if (!container) return;
    const items = container.querySelectorAll(itemSelector);
    items.forEach(item => {
      const textEl = item.querySelector(textSelector);
      if (!textEl) return;
      const name = textEl.textContent.toLowerCase();
      if (term === '' || name.includes(term)) {
        item.style.display = '';
      } else {
        item.style.display = 'none';
      }
    });
  }

  // Attach filter events after DOM is ready
  document.addEventListener('DOMContentLoaded', function() {
    // Wet search
    const wetSearch = document.getElementById('wet-search');
    if (wetSearch) {
      wetSearch.addEventListener('input', function() {
        filterList('wet-list', 'wet-search', '.ingredient-item', 'span strong');
      });
    }
    // Dry search
    const drySearch = document.getElementById('dry-search');
    if (drySearch) {
      drySearch.addEventListener('input', function() {
        filterList('dry-list', 'dry-search', '.ingredient-item', 'span strong');
      });
    }
    // Ingredient search in create drink
    const ingSearch = document.getElementById('ingredient-search');
    if (ingSearch) {
      ingSearch.addEventListener('input', function() {
        filterList('ingredient-checkboxes', 'ingredient-search', '.ing-check-wrapper', 'span');
      });
    }
  });

  // ---------- Load ingredients ----------
  async function loadIngredients() {
    const now = Date.now();

    // Wet
    const wet = await fetchJSON(`/api/ingredients/wet?_=${now}`);
    if (wet) {
      const wetContainer = document.getElementById('wet-list');
      if (wet.length === 0) {
        wetContainer.innerHTML = '<p style="color: #8B8680; text-align: center;">No wet ingredients yet</p>';
      } else {
        wetContainer.innerHTML = wet.map(i => `
          <div class="ingredient-item" data-id="${i.id}" data-type="wet">
            <div class="ingredient-display">
              <label>
                <input type="checkbox" ${i.is_active ? 'checked' : ''} onchange="toggleIngredient('wet', ${i.id})">
                <span><strong>${i.name}</strong>${i.unit ? ` • ${i.unit}` : ''}</span>
              </label>
              <div class="ingredient-actions">
                <button type="button" onclick="openEditModal(${i.id}, 'wet', '${i.name.replace(/'/g, "\\'")}', '${(i.unit || '').replace(/'/g, "\\'")}')" style="margin: 0;">✏️</button>
                <button type="button" class="danger" onclick="deleteIngredient('wet', ${i.id})" style="padding: 0.4rem 0.8rem; margin: 0;">🗑️</button>
              </div>
            </div>
          </div>
        `).join('');
        // Re-apply filter
        filterList('wet-list', 'wet-search', '.ingredient-item', 'span strong');
      }
    }

    // Dry
    const dry = await fetchJSON(`/api/ingredients/dry?_=${now}`);
    if (dry) {
      const dryContainer = document.getElementById('dry-list');
      if (dry.length === 0) {
        dryContainer.innerHTML = '<p style="color: #8B8680; text-align: center;">No dry ingredients yet</p>';
      } else {
        dryContainer.innerHTML = dry.map(i => `
          <div class="ingredient-item" data-id="${i.id}" data-type="dry">
            <div class="ingredient-display">
              <label>
                <input type="checkbox" ${i.is_active ? 'checked' : ''} onchange="toggleIngredient('dry', ${i.id})">
                <span><strong>${i.name}</strong>${i.unit ? ` • ${i.unit}` : ''}</span>
              </label>
              <div class="ingredient-actions">
                <button type="button" onclick="openEditModal(${i.id}, 'dry', '${i.name.replace(/'/g, "\\'")}', '${(i.unit || '').replace(/'/g, "\\'")}')" style="margin: 0;">✏️</button>
                <button type="button" class="danger" onclick="deleteIngredient('dry', ${i.id})" style="padding: 0.4rem 0.8rem; margin: 0;">🗑️</button>
              </div>
            </div>
          </div>
        `).join('');
        // Re-apply filter
        filterList('dry-list', 'dry-search', '.ingredient-item', 'span strong');
      }
    }

    // Populate ingredient checkboxes with amount input
    if (wet && dry) {
      const allIngredients = [...wet.map(w => ({...w, type:'wet'})), ...dry.map(d => ({...d, type:'dry'}))];
      const checkDiv = document.getElementById('ingredient-checkboxes');
      if (allIngredients.length === 0) {
        checkDiv.innerHTML = '<p style="color: #8B8680;">Add ingredients first</p>';
      } else {
        checkDiv.innerHTML = allIngredients.map(ing => `
          <div class="ing-check-wrapper" data-ingredient-name="${ing.name.toLowerCase()}">
            <label>
              <input type="checkbox" class="ing-check" data-id="${ing.id}" data-type="${ing.type}" onchange="toggleQuantityInput(this)">
              <span>${ing.name} <em>(${ing.type})</em></span>
            </label>
            <input type="number" class="ing-quantity" min="0" step="0.25" value="1" disabled>
            <span class="unit-hint">${ing.unit || ''}</span>
          </div>
        `).join('');
        // Re-apply filter
        filterList('ingredient-checkboxes', 'ingredient-search', '.ing-check-wrapper', 'span');
      }
    }

    updateStats();
  }

  // Enable/disable quantity input based on checkbox
  function toggleQuantityInput(checkbox) {
    const wrapper = checkbox.closest('.ing-check-wrapper');
    const qtyInput = wrapper.querySelector('.ing-quantity');
    qtyInput.disabled = !checkbox.checked;
    if (!checkbox.checked) qtyInput.value = '';
  }

  // ---------- Toggle ingredient ----------
  window.toggleIngredient = async function(type, id) {
    const result = await fetchJSON(`/api/ingredients/${type}/${id}/toggle`, { method: 'PUT' });
    if (result) {
      loadIngredients();
      loadOrders();
    }
  };

  // ---------- Delete ingredient ----------
  window.deleteIngredient = async function(type, id) {
    if (!confirm('Delete this ingredient? It will be removed from all drink recipes.')) return;
    const result = await fetchJSON(`/api/ingredients/${type}/${id}`, { method: 'DELETE' });
    if (result && result.success) {
      showToast('Ingredient deleted');
      loadIngredients();
    } else {
      showToast('Delete failed.', true);
    }
  };

  // ---------- Load pending orders ----------
  async function loadOrders() {
    const orders = await fetchJSON('/api/orders/pending');
    const container = document.getElementById('orders-list');
    
    if (!orders || orders.length === 0) {
      container.innerHTML = '<p style="text-align: center; color: #8B8680;">No orders yet</p>';
      updateStats();
      return;
    }

    container.innerHTML = orders.map((o, index) => `
      <div class="order-item" style="animation-delay: ${index * 0.05}s">
        <div style="flex: 1;">
          <div style="color: var(--color-neon-cyan); font-weight: 600; margin-bottom: 0.3rem;">${o.drink_name}</div>
          <small style="color: var(--color-text-dim); font-size: 0.8rem;">${new Date(o.created_at).toLocaleTimeString()}</small>
        </div>
        <button type="button" class="primary" onclick="completeOrder(${o.id})" style="padding: 0.5rem 1rem; font-size: 0.85rem; margin: 0;">✓ Done</button>
      </div>
    `).join('');

    updateStats();
  }

  window.completeOrder = async function(id) {
    const result = await fetchJSON(`/api/orders/${id}/complete`, { method: 'PUT' });
    if (result && result.success) {
      showToast('Order completed');
      loadOrders();
    }
  };

  // ---------- Add ingredient forms ----------
  document.getElementById('add-wet-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('wet-name').value.trim();
    const unit = document.getElementById('wet-unit').value.trim();
    if (!name) return;

    const result = await fetchJSON('/api/ingredients/wet', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, unit })
    });

    if (result && result.id) {
      document.getElementById('wet-name').value = '';
      document.getElementById('wet-unit').value = '';
      showToast('Ingredient added');
      loadIngredients();
    } else {
      showToast('Failed to add ingredient', true);
    }
  });

  document.getElementById('add-dry-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('dry-name').value.trim();
    const unit = document.getElementById('dry-unit').value.trim();
    if (!name) return;

    const result = await fetchJSON('/api/ingredients/dry', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, unit })
    });

    if (result && result.id) {
      document.getElementById('dry-name').value = '';
      document.getElementById('dry-unit').value = '';
      showToast('Ingredient added');
      loadIngredients();
    } else {
      showToast('Failed to add ingredient', true);
    }
  });

  // ---------- Add drink form ----------
  document.getElementById('add-drink-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('drink-name').value.trim();
    const description = document.getElementById('drink-desc').value.trim();
    const instructions = document.getElementById('drink-instr').value.trim();
    if (!name) return;

    const checkboxes = document.querySelectorAll('.ing-check:checked');
    const ingredients = Array.from(checkboxes).map(cb => {
      const wrapper = cb.closest('.ing-check-wrapper');
      const qtyInput = wrapper.querySelector('.ing-quantity');
      const quantity = qtyInput.value ? parseFloat(qtyInput.value) : '';
      return {
        type: cb.dataset.type,
        id: parseInt(cb.dataset.id),
        quantity: quantity !== '' ? quantity.toString() : ''
      };
    });

    if (ingredients.length === 0) {
      showToast('Please select at least one ingredient', true);
      return;
    }

    const result = await fetchJSON('/api/drinks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, description, instructions, ingredients })
    });

    if (result && result.id) {
      document.getElementById('drink-name').value = '';
      document.getElementById('drink-desc').value = '';
      document.getElementById('drink-instr').value = '';
      document.querySelectorAll('.ing-check:checked').forEach(cb => {
        cb.checked = false;
        const wrapper = cb.closest('.ing-check-wrapper');
        const qtyInput = wrapper.querySelector('.ing-quantity');
        qtyInput.disabled = true;
        qtyInput.value = '';
      });
      showToast('Recipe created!');
      updateStats();
    } else {
      showToast('Failed to create recipe.', true);
    }
  });

  // ---------- Stats ----------
  function updateStats() {
    const wetItems = document.querySelectorAll('#wet-list .ingredient-item').length;
    const dryItems = document.querySelectorAll('#dry-list .ingredient-item').length;
    const pendingOrders = document.querySelectorAll('#orders-list .order-item').length;
    
    document.getElementById('wet-count').textContent = wetItems;
    document.getElementById('dry-count').textContent = dryItems;
    document.getElementById('order-count').textContent = pendingOrders;
  }

  // ---------- Polling ----------
  setInterval(loadOrders, 2000);

  // Initial load
  loadIngredients();
  loadOrders();
</script>
</body>
</html>
